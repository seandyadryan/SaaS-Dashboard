services:
  neurax-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurax-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - neurax-dashboard-api

  neurax-dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: neurax-dashboard-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DASHBOARD_ADMIN_USERNAME: ${DASHBOARD_ADMIN_USERNAME:-admin}
      DASHBOARD_ADMIN_EMAIL: ${DASHBOARD_ADMIN_EMAIL:-}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:-P@ssw0rd}
      DASHBOARD_AUTH_SECRET: ${DASHBOARD_AUTH_SECRET:-replace-this-secret}
      STORAGE_ROOT: /storage
      STORAGE_STAT_PATH: /storage
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - ./public:/storage/dashboard-public:ro
