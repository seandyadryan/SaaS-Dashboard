services:
  neurax-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurax-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - neurax-dashboard-api

  neurax-dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: neurax-dashboard-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
    expose:
      - "3000"
